<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工业智能生产力平台</title>
    <script>
        // 检查登录状态并显示相应的导航栏
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态，实际项目中应从localStorage或cookie中获取
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            
            // 显示或隐藏相应的导航栏
            const unloggedNav = document.getElementById('unloggedNav');
            const loggedNav = document.getElementById('loggedNav');
            
            if (unloggedNav && loggedNav) {
                if (isLoggedIn) {
                    unloggedNav.style.display = 'none';
                    loggedNav.style.display = 'block';
                } else {
                    unloggedNav.style.display = 'block';
                    loggedNav.style.display = 'none';
                }
            }

            // 为登录按钮添加点击事件
            const loginButtons = document.querySelectorAll('a[href="#"]');
            loginButtons.forEach(button => {
                if (button.textContent.trim() === '登录') {
                    button.addEventListener('click', function(e) {
                        e.preventDefault();
                        // 向父页面发送显示登录弹窗的消息
                        window.parent.postMessage({ type: 'SHOW_LOGIN_MODAL' }, '*');
                    });
                }
            });
        });

        // 显示退出确认对话框
        function showLogoutConfirm() {
            // 向父页面发送显示退出确认弹窗的消息
            window.parent.postMessage({ type: 'SHOW_LOGOUT_MODAL' }, '*');
        }

        // 处理来自父页面的消息
        window.addEventListener('message', (event) => {
            if (event.data.type === 'LOGIN_SUCCESS') {
                // 登录成功，刷新页面
                window.location.reload();
            }
        });
    </script>
</head>
<body>
    <!-- 顶部导航栏 - 未登录状态 -->
    <div id="unloggedNav" style="background: #0051d9;height: 36px; position: fixed; top: 0; left: 0; width: 100%; z-index: 99998;">
        <div style="width: 1440px; margin: 0 auto; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 20px;">
            <div style="display: flex; align-items: center; gap: 20px; font-size: 12px; color: #FFFFFF; line-height: 36px;">
                <span>您好！欢迎您</span>
                <a href="#" style="color: #FFFFFF; text-decoration: none; display: inline-block; line-height: 36px;">登录</a>
            </div>
            <div style="display: flex; align-items: center; gap: 20px; font-size: 12px; color: #6c757d; line-height: 36px;">
                <a href="#" style="color: #FFFFFF; text-decoration: none; display: inline-block; line-height: 36px;">消息中心</a>
                <a href="#" style="color: #FFFFFF; text-decoration: none; display: inline-block; line-height: 36px;">我的订单</a>
                <a href="#" style="color: #FFFFFF; text-decoration: none; display: inline-block; line-height: 36px;">个人中心</a>
                <a href="#" style="color: #FFFFFF; text-decoration: none; display: inline-block; line-height: 36px;">资质认证</a>
                <div style="display: flex; align-items: center; gap: 6px; color: #FFFFFF;">
                    <svg style="width: 14px; height: 14px; color: #F37021;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span style="color: #F37021;">北京</span>
                    <span style="color: #86909C;">[切换城市]</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 顶部导航栏 - 已登录状态 -->
    <div id="loggedNav" style="background: #0051d9;height: 36px; position: fixed; top: 0; left: 0; width: 100%; z-index: 99997;">
        <div style="width: 1440px; margin: 0 auto; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 20px;">
            <div style="display: flex; align-items: center; gap: 20px; font-size: 12px; color: #FFFFFF; line-height: 36px;">
                <span>林工(东莞市嘉东网络科技有限公司)</span>
                <a href="#" style="color: #F37021; text-decoration: none; display: inline-block; line-height: 36px; transition: all 0.3s;" onclick="showLogoutConfirm()">退出</a>
            </div>
            <div style="display: flex; align-items: center; gap: 20px; font-size: 12px; color: #6c757d; line-height: 36px;">
                <a href="#" style="color: #FFFFFF; text-decoration: none; display: inline-block; line-height: 36px;">消息中心<span style="color: #F37021; font-weight: bold;">(99+)</span></a>
                <a href="#" style="color: #FFFFFF; text-decoration: none; display: inline-block; line-height: 36px;">我的订单</a>
                <a href="#" style="color: #FFFFFF; text-decoration: none; display: inline-block; line-height: 36px;">个人中心</a>
                <a href="#" style="color: #FFFFFF; text-decoration: none; display: inline-block; line-height: 36px;">资质认证</a>
                <div style="display: flex; align-items: center; gap: 6px; color: #FFFFFF;">
                    <svg style="width: 14px; height: 14px; color: #F37021;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span style="color: #F37021;">北京</span>
                    <span style="color: #86909C;">[切换城市]</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
