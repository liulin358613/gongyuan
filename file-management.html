<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        .file-item {
            transition: background-color 0.2s ease;
            cursor: pointer;
        }
        .file-item:hover {
            background-color: #F5F5F5;
        }
        .file-item:hover .file-action {
            opacity: 1;
        }
        .file-action {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .file-item.selected {
            background-color: #E8F3FF;
        }
    </style>
</head>
<body>
    <div style="display: flex; height: 100%; width: 100%;">
        <!-- 左侧文件列表 -->
        <div style="width: 200px; border-right: 1px solid #E5E7EB; background-color: #FFFFFF; padding: 16px 16px 0px 0px;">
            <h3 style="font-size: 16px; font-weight: 600; color: #1D2129; margin-bottom: 16px;">我的文件</h3>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid #E5E7EB; border-radius: 6px; cursor: pointer; font-size: 14px; color: #1D2129;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #4a6cf7;">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                    <span>最近</span>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid #E5E7EB; border-radius: 6px; cursor: pointer; font-size: 14px; color: #1D2129;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #4a6cf7;">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                    <span>收藏</span>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid #E5E7EB; border-radius: 6px; cursor: pointer; font-size: 14px; color: #1D2129;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #4a6cf7;">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    <span>我的云盘</span>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid #E5E7EB; border-radius: 6px; cursor: pointer; font-size: 14px; color: #1D2129;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #4a6cf7;">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span>本地文件</span>
                </div>
            </div>
        </div>
        <!-- 右侧内容区 -->
        <div style="flex: 1; display: flex; flex-direction: column; border-left: 1px solid #E5E7EB;">
            <!-- 上部分：相关操作区 -->
            <div style="border-bottom: 1px solid #E5E7EB; background-color: #FFFFFF; padding: 16px 0 10px 16px; display: flex; flex-direction: column; gap: 16px;">
                <!-- 操作按钮 -->
                <div style="display: flex; gap: 12px;">
                    <button style="display: flex; align-items: center; gap: 6px; padding: 6px 16px; border: 1px solid #E5E7EB; border-radius: 6px; background-color: #FFFFFF; font-size: 14px; color: #1D2129; cursor: pointer;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #4a6cf7;">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                        <span>上传</span>
                    </button>
                    <button style="display: flex; align-items: center; gap: 6px; padding: 6px 16px; border: 1px solid #E5E7EB; border-radius: 6px; background-color: #FFFFFF; font-size: 14px; color: #1D2129; cursor: pointer;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #4a6cf7;">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span>新建文件夹</span>
                    </button>
                    <button style="display: flex; align-items: center; gap: 6px; padding: 6px 16px; border: 1px solid #E5E7EB; border-radius: 6px; background-color: #FFFFFF; font-size: 14px; color: #1D2129; cursor: pointer;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #4a6cf7;">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        <span>新建文件</span>
                    </button>
                </div>
                <!-- 面包屑导航和操作按钮 -->
                <div style="padding-right: 16px; display: flex; justify-content: space-between; align-items: center;">
                    <!-- 面包屑导航 -->
                    <div class="breadcrumb" style="display: flex; align-items: center; gap: 8px; font-size: 14px; color: #666;">
                        <span>我的文件</span>
                        <span>></span>
                        <span>最近</span>
                    </div>
                    <!-- 操作按钮 -->
                    <div style="display: flex; gap: 12px;">
                        <button style="display: flex; align-items: center; gap: 6px; padding: 4px 12px; border: 1px solid #E5E7EB; border-radius: 6px; background-color: #FFFFFF; font-size: 14px; color: #1D2129; cursor: pointer;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #4a6cf7;">
                                <polyline points="5 9 2 12 5 15"></polyline>
                                <polyline points="9 5 12 2 15 5"></polyline>
                                <polyline points="15 19 12 22 9 19"></polyline>
                                <polyline points="19 9 22 12 19 15"></polyline>
                            </svg>
                            <span>移动</span>
                        </button>
                        <button style="display: flex; align-items: center; gap: 6px; padding: 4px 12px; border: 1px solid #E5E7EB; border-radius: 6px; background-color: #FFFFFF; font-size: 14px; color: #1D2129; cursor: pointer;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #4a6cf7;">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                            <span>删除</span>
                        </button>
                    </div>
                </div>
            </div>
            <!-- 下部分：详情区 -->
            <div style="flex: 1; background-color: #FFFFFF;">
                <!-- 文件列表 -->
                <div style="width: 100%; height: calc(100% - 38px); overflow: hidden;">
                    <!-- 表头 -->
                    <div style="display: flex; border-bottom: 1px solid #E5E7EB; background-color: #F8F9FA; font-size: 14px; font-weight: 500; color: #666;">
                        <div style="width: 40px; padding: 12px 16px; display: flex; align-items: center;">
                            <input type="checkbox" style="margin: 0;">
                        </div>
                        <div style="flex: 1; min-width: 146px; padding: 12px 16px; display: flex; align-items: center; gap: 4px;">文件名 <span>↕</span></div>
                        <div style="width: 80px; padding: 12px 16px;">大小</div>
                        <div style="width: 80px; padding: 12px 16px;">类型</div>
                        <div style="width: 146px; padding: 12px 16px;">修改时间</div>
                        <div style="width: 60px; padding: 12px 16px;"></div>
                    </div>
                    <!-- 列表内容 -->
                    <div style="height: calc(100% - 38px); overflow-y: auto;">
                        <!-- 文件夹1 -->
                        <div class="file-item" style="display: flex; border-bottom: 1px solid #F0F0F0; font-size: 14px; color: #333; transition: background-color 0.2s ease; cursor: pointer;">
                            <div style="width: 40px; padding: 16px; display: flex; align-items: center;">
                                <input type="checkbox" style="margin: 0;">
                            </div>
                            <div style="flex: 1; padding: 16px;">AI对话历史</div>
                            <div style="width: 80px; padding: 16px;">-</div>
                            <div style="width: 80px; padding: 16px;">文件夹</div>
                            <div style="width: 146px; padding: 16px;">2026.04.17 10:30</div>
                            <div style="width: 60px; padding: 16px; display: flex; align-items: center; justify-content: center;">
                                <div class="file-action" style="opacity: 0; transition: opacity 0.2s ease;">
                                    <button style="background: none; border: none; cursor: pointer; font-size: 16px; color: #666; padding: 4px; border-radius: 4px; hover: background-color #F0F0F0;">...</button>
                                </div>
                            </div>
                        </div>
                        <!-- 文件夹2 -->
                        <div class="file-item" style="display: flex; border-bottom: 1px solid #F0F0F0; font-size: 14px; color: #333; transition: background-color 0.2s ease; cursor: pointer;">
                            <div style="width: 40px; padding: 16px; display: flex; align-items: center;">
                                <input type="checkbox" style="margin: 0;">
                            </div>
                            <div style="flex: 1; padding: 16px;">智能助手设置</div>
                            <div style="width: 80px; padding: 16px;">-</div>
                            <div style="width: 80px; padding: 16px;">文件夹</div>
                            <div style="width: 146px; padding: 16px;">2026.04.16 15:45</div>
                            <div style="width: 60px; padding: 16px; display: flex; align-items: center; justify-content: center;">
                                <div class="file-action" style="opacity: 0; transition: opacity 0.2s ease;">
                                    <button style="background: none; border: none; cursor: pointer; font-size: 16px; color: #666; padding: 4px; border-radius: 4px; hover: background-color #F0F0F0;">...</button>
                                </div>
                            </div>
                        </div>
                        <!-- 文件夹3 -->
                        <div class="file-item" style="display: flex; border-bottom: 1px solid #F0F0F0; font-size: 14px; color: #333; transition: background-color 0.2s ease; cursor: pointer;">
                            <div style="width: 40px; padding: 16px; display: flex; align-items: center;">
                                <input type="checkbox" style="margin: 0;">
                            </div>
                            <div style="flex: 1; padding: 16px;">AI生成内容</div>
                            <div style="width: 80px; padding: 16px;">-</div>
                            <div style="width: 80px; padding: 16px;">文件夹</div>
                            <div style="width: 146px; padding: 16px;">2026.04.15 09:20</div>
                            <div style="width: 60px; padding: 16px; display: flex; align-items: center; justify-content: center;">
                                <div class="file-action" style="opacity: 0; transition: opacity 0.2s ease;">
                                    <button style="background: none; border: none; cursor: pointer; font-size: 16px; color: #666; padding: 4px; border-radius: 4px; hover: background-color #F0F0F0;">...</button>
                                </div>
                            </div>
                        </div>
                        <!-- 文件1 -->
                        <div class="file-item" style="display: flex; border-bottom: 1px solid #F0F0F0; font-size: 14px; color: #333; transition: background-color 0.2s ease; cursor: pointer;">
                            <div style="width: 40px; padding: 16px; display: flex; align-items: center;">
                                <input type="checkbox" style="margin: 0;">
                            </div>
                            <div style="flex: 1; padding: 16px;">产品需求文档.md</div>
                            <div style="width: 80px; padding: 16px;">2.5MB</div>
                            <div style="width: 80px; padding: 16px;">Markdown</div>
                            <div style="width: 146px; padding: 16px;">2026.04.17 08:15</div>
                            <div style="width: 60px; padding: 16px; display: flex; align-items: center; justify-content: center;">
                                <div class="file-action" style="opacity: 0; transition: opacity 0.2s ease;">
                                    <button style="background: none; border: none; cursor: pointer; font-size: 16px; color: #666; padding: 4px; border-radius: 4px; hover: background-color #F0F0F0;">...</button>
                                </div>
                            </div>
                        </div>
                        <!-- 文件2 -->
                        <div class="file-item" style="display: flex; border-bottom: 1px solid #F0F0F0; font-size: 14px; color: #333; transition: background-color 0.2s ease; cursor: pointer;">
                            <div style="width: 40px; padding: 16px; display: flex; align-items: center;">
                                <input type="checkbox" style="margin: 0;">
                            </div>
                            <div style="flex: 1; padding: 16px;">用户调研报告.pdf</div>
                            <div style="width: 80px; padding: 16px;">4.8MB</div>
                            <div style="width: 80px; padding: 16px;">PDF</div>
                            <div style="width: 146px; padding: 16px;">2026.04.16 14:30</div>
                            <div style="width: 60px; padding: 16px; display: flex; align-items: center; justify-content: center;">
                                <div class="file-action" style="opacity: 0; transition: opacity 0.2s ease;">
                                    <button style="background: none; border: none; cursor: pointer; font-size: 16px; color: #666; padding: 4px; border-radius: 4px; hover: background-color #F0F0F0;">...</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 选中文件路径显示 -->
                <div id="selectedFilePath" style="border-top: 1px solid #E5E7EB; padding: 8px 16px; font-size: 14px; color: #666; background-color: #F8F9FA; display: none;">
                    文件路径：<span id="filePathText"></span>
                </div>
            </div>
        </div>
    </div>
    <script>
        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // 添加文件项的交互效果
            document.querySelectorAll('.file-item').forEach(item => {
                // 鼠标悬停效果
                item.addEventListener('mouseenter', function() {
                    this.style.backgroundColor = '#F5F5F5';
                    this.querySelector('.file-action').style.opacity = '1';
                });
                
                // 鼠标离开效果
                item.addEventListener('mouseleave', function() {
                    if (!this.classList.contains('selected')) {
                        this.style.backgroundColor = '';
                    }
                    this.querySelector('.file-action').style.opacity = '0';
                });
                
                // 点击选中效果
                item.addEventListener('click', function(e) {
                    // 阻止点击复选框时的事件冒泡
                    if (e.target.type === 'checkbox') return;
                    
                    // 检查是否已经选中
                    if (this.classList.contains('selected')) {
                        // 取消选中状态
                        this.classList.remove('selected');
                        this.style.backgroundColor = '';
                        
                        // 隐藏选中文件路径
                        const selectedFilePath = document.getElementById('selectedFilePath');
                        selectedFilePath.style.display = 'none';
                    } else {
                        // 移除其他项的选中状态
                        document.querySelectorAll('.file-item').forEach(i => {
                            i.classList.remove('selected');
                            i.style.backgroundColor = '';
                        });
                        
                        // 添加当前项的选中状态
                        this.classList.add('selected');
                        this.style.backgroundColor = '#E8F3FF';
                        
                        // 显示选中文件路径
                        const fileName = this.querySelector('div:nth-child(2)').textContent;
                        const breadcrumb = document.querySelector('.breadcrumb').textContent;
                        const filePath = breadcrumb.replace(/\s+>/g, '/').trim();
                        const fullPath = filePath + '/' + fileName;
                        
                        const selectedFilePath = document.getElementById('selectedFilePath');
                        const filePathText = document.getElementById('filePathText');
                        filePathText.textContent = fullPath;
                        selectedFilePath.style.display = 'block';
                    }
                });
            });
        });
    </script>
</body>
</html>
